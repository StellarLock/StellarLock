name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Upgraded to 22 to clear the Action runner deprecation warning

      # Custom cache setup bypasses the workspace/pnpm store validation panic
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Non-blocking for now: ~325 pre-existing errors (mostly type-aware lint
      # rules firing in test files) need a dedicated cleanup pass before this
      # can gate merges. Type Check and Build below are blocking.
      - name: Lint (ESLint)
        run: pnpm exec eslint . || true

      - name: Type Check
        run: pnpm exec tsc -b

      - name: Build Vite App
        run: pnpm build

  contracts:
    name: Smart Contract Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32v1-none

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./contracts

      # Replaced manual curl/tar sequence with the official Stellar step
      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v27.0.0

      - name: Build Contracts
        run: stellar contract build