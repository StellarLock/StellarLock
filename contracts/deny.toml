[advisories]
# Default is to deny vulnerabilities
vulnerability = "deny"

[licenses]
# The 'unlicensed' check is now implicit or handled by 'allow' logic
# 'allow-osi-fsf-free' is replaced by explicit list
allow = [
    "MIT",
    "Apache-2.0",
]

# This is the modern way to handle the dual-license issue
[[licenses.clarify]]
name = "ahash"
expression = "MIT OR Apache-2.0"
license-files = [ { path = "LICENSE-MIT" }, { path = "LICENSE-APACHE" } ]